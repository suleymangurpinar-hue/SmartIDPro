name: smart_id_pro

description: Smart ID Pro

publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  file_picker: ^10.2.0
  provider: ^6.1.5
  path: ^1.9.1
  path_provider: ^2.1.5
  image: ^4.5.4
  onnxruntime: ^1.4.1
  sqflite_common_ffi: ^2.3.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/data/
    - assets/models/
    - assets/images/
    - assets/icons/
    - assets/logos/
    - assets/templates/